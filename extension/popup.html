<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WatchSync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: #07090f;
      color: #e8eef8;
      font-family: 'DM Sans', system-ui, sans-serif;
      padding: 20px;
    }
    .logo {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
    }
    .logo svg { flex-shrink: 0; }
    .logo-text {
      font-size: 18px; font-weight: 800; letter-spacing: -0.02em;
    }
    .logo-accent { color: #06b6d4; }
    .tagline {
      font-size: 12px; color: #6b7a94;
      margin-bottom: 20px; line-height: 1.5;
    }
    .status {
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .status.idle    { background: #10151f; border: 1px solid #1a2030; color: #6b7a94; }
    .status.running { background: rgba(6,182,212,.1); border: 1px solid rgba(6,182,212,.25); color: #06b6d4; }
    .status.success { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.25); color: #10b981; }
    .status.error   { background: rgba(239,68,68,.1);  border: 1px solid rgba(239,68,68,.25);  color: #f87171; }
    .progress-bar { height: 2px; background: #1a2030; border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg,#06b6d4,#8b5cf6); transition: width .3s ease; border-radius: 2px; }
    .btn {
      width: 100%; padding: 10px;
      background: #06b6d4; color: #07090f;
      border: none; border-radius: 6px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .2s;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn:disabled { opacity: .4; cursor: not-allowed; filter: none; }
    .open-link {
      display: block; text-align: center;
      margin-top: 12px; font-size: 11px;
      color: #4a5568; text-decoration: none;
    }
    .open-link:hover { color: #06b6d4; }
  </style>
</head>
<body>
  <div class="logo">
    <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
      <circle cx="11" cy="16" r="9" stroke="#06b6d4" stroke-width="2" opacity=".5"/>
      <circle cx="21" cy="16" r="9" stroke="#f59e0b" stroke-width="2" opacity=".5"/>
      <path d="M13.5 12.5l6 3.5-6 3.5V12.5z" fill="white"/>
    </svg>
    <span class="logo-text">Watch<span class="logo-accent">Sync</span></span>
  </div>

  <p class="tagline">Sync your Netflix history to WatchSync — no copy-paste required.</p>

  <div id="status" class="status idle">
    Ready to extract your viewing history.
  </div>

  <button id="syncBtn" class="btn">⚡ Sync Netflix History</button>

  <a id="openApp" class="open-link" href="https://watchwsync.app" target="_blank">
    Open WatchSync →
  </a>

  <script src="popup.js"></script>
</body>
</html>
