name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: lint + build check ──────────────────────────────────────────
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .  # root = frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Point to a dummy backend URL for the build check
          VITE_API_URL: https://api.placeholder.example

  # ── Backend: dependency audit + startup check ─────────────────────────────
  backend:
    name: Backend — Audit & Startup
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit for vulnerabilities
        run: npm audit --audit-level=high

      - name: Health check (5-second smoke test)
        run: |
          ANTHROPIC_API_KEY=sk-dummy \
          TMDB_API_KEY=dummy \
          CLIENT_ORIGIN=http://localhost:5173 \
          node server.js &
          SERVER_PID=$!
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health)
          kill $SERVER_PID
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed — got HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed ✓"

